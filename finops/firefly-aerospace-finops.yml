description: >-
  FinOps view of Firefly Aerospace. Firefly does not operate a public,
  usage-metered developer API, so there is no per-request, per-token, or
  per-call cloud-style billing to model under a FinOps/FOCUS lens. Firefly's
  costs are mission-based capital procurements - dedicated Alpha and Eclipse
  launches, Blue Ghost lunar delivery, and Elytra/Ocula on-orbit services -
  contracted per engagement rather than consumed as cloud spend.
notes: >-
  No API consumption meters exist; reconciled is false because there is no
  usage-based API billing to reconcile. For context only, Alpha dedicated
  launches carry a publicly cited list price of roughly $15M-$17.6M; all other
  mission pricing is quoted per contract. This artifact is maintained for
  catalog consistency.
