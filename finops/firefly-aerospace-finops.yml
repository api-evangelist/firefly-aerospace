principles:
- name: Visibility
  description: Track committed mission/launch contracts; there is no per-request API spend to monitor.
- name: Allocation
  description: Map launch and mission contracts to programs/payloads rather than API keys.
- name: Optimization
  description: Consider rideshare/payload slots on Alpha versus dedicated launches to reduce per-payload cost.
- name: Accountability
  description: Assign mission owners and review contracted launch and service spend per program.
