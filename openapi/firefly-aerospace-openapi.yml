openapi: 3.0.1
info:
  title: Firefly Aerospace API
  description: >-
    Firefly Aerospace does not publish a public developer API. Firefly is a space
    transportation company offering the Alpha small-lift rocket, the Eclipse
    (formerly MLV) medium-lift vehicle, the Blue Ghost lunar lander, and the
    Elytra orbital vehicle (with the Ocula lunar imaging service). Launch, lunar
    delivery, on-orbit services, and rideshare/payload bookings are arranged
    through Firefly sales, the "Book A Ride" web inquiry workflow, and published
    Payload User's Guides - not through a programmatic REST/HTTP API. This
    OpenAPI document is an intentionally empty placeholder maintained for
    catalog consistency; no endpoints are documented because none are publicly
    exposed. If Firefly publishes a developer API in the future, this document
    will be updated with real paths and schemas.
  termsOfService: https://fireflyspace.com/
  contact:
    name: Firefly Aerospace
    url: https://fireflyspace.com/contact/
  version: '0.0'
servers:
  - url: https://fireflyspace.com
    description: Firefly Aerospace marketing and product website (no API surface).
paths: {}
