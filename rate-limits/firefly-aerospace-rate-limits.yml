description: >-
  Firefly Aerospace does not expose a public developer API, so there are no
  programmatic rate limits, quotas, or throttling policies to document. Its
  product surfaces (Alpha, Eclipse, Blue Ghost, Elytra/Ocula, and the "Book A
  Ride" rideshare/payload workflow) are sales- and mission-integration-driven,
  not request-metered.
notes: >-
  No API rate limits exist; reconciled is false because there is no public API
  to reconcile against. This artifact is maintained for catalog consistency.
